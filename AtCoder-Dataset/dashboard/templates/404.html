{% extends "base.html" %}

{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="container text-center py-5 my-5">
    <h1 class="display-1 fw-bold text-danger">404</h1>
    <h2 class="mb-4">Page Not Found</h2>
    <p class="lead mb-5">The requested resource could not be found on this server.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary btn-lg">Return to Home</a>
</div>
{% endblock %}
