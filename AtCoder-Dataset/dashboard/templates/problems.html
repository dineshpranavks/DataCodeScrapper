{% extends "base.html" %}

{% block title %}Problems - Dataset Explorer{% endblock %}

{% block content %}
<div class="container-fluid px-4 mt-4">
    <div class="row mb-4 align-items-end">
        <div class="col-md-3">
            <label class="form-label fw-bold">Search</label>
            <input type="text" id="searchInput" class="form-control" placeholder="Search by ID, Contest, Title...">
        </div>
        <div class="col-md-2">
            <label class="form-label fw-bold">Topic</label>
            <select id="topicFilter" class="form-select">
                <option value="">All Topics</option>
                {% for topic in topics %}
                <option value="{{ topic }}">{{ topic }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label fw-bold">Difficulty</label>
            <select id="difficultyFilter" class="form-select">
                <option value="">All Difficulties</option>
                {% for diff in difficulties %}
                <option value="{{ diff }}">{{ diff }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label fw-bold">Contest</label>
            <select id="contestFilter" class="form-select">
                <option value="">All Contests</option>
                {% for contest in contests %}
                <option value="{{ contest }}">{{ contest }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-2 ms-auto text-end">
            <button id="exportCsvBtn" class="btn btn-outline-success w-100">
                <i class="bi bi-download"></i> Export CSV
            </button>
        </div>
    </div>

    <div class="card shadow-sm mb-4">
        <div class="card-body p-0 table-responsive">
            <table class="table table-hover table-striped mb-0 align-middle" id="problemsTable">
                <thead class="table-dark">
                    <tr>
                        <th class="sortable" data-sort="problem_id">Problem ID <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="contest_id">Contest <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="title">Title <span class="sort-icon"></span></th>
                        <th>Topic</th>
                        <th>Subtopic</th>
                        <th class="sortable" data-sort="difficulty">Difficulty <span class="sort-icon"></span></th>
                        <th class="sortable" data-sort="rating">Rating <span class="sort-icon"></span></th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody id="problemsTableBody">
                    <!-- Data will be loaded dynamically via JS -->
                </tbody>
            </table>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <span class="me-2 text-muted">Rows per page:</span>
                <select id="limitSelect" class="form-select form-select-sm w-auto">
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
                <span class="ms-3 text-muted" id="totalCountDisplay">Showing 0 problems</span>
            </div>
            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0" id="paginationControls">
                    <!-- Pagination will be loaded dynamically -->
                </ul>
            </nav>
        </div>
    </div>
</div>
{% endblock %}
